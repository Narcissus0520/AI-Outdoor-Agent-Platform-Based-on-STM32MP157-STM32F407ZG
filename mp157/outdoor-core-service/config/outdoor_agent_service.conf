# Headless Stage 2 Runtime configuration for systemd supervision.
# The service owns live sensor input and volatile status under /run.
# SD history and framebuffer UI remain separate, explicitly enabled workflows.

gnss_input_mode = serial
nmea_input_path = /opt/outdoor-agent/data/nmea_sample.txt
gnss_serial_device = /dev/ttySTM2
gnss_serial_baud = 38400
gnss_serial_capture_seconds = 0

mcu_input_mode = serial
mcu_mock_input_path = /opt/outdoor-agent/data/mcu_mock_frames.txt
mcu_serial_device = /dev/ttySTM1
mcu_serial_baud = 115200
mcu_serial_capture_seconds = 0
mcu_command = ping

runtime_run_seconds = 0
status_output_path = /run/outdoor-agent/runtime_status.json
status_socket_enabled = true
status_socket_path = /run/outdoor-agent/outdoor_core.sock

storage_enabled = false
storage_root_path = /run/media/mmcblk1p1/outdoor-agent
storage_status_output_path = status/runtime_status.json
storage_dashboard_output_path = dashboard/dashboard.txt
storage_log_file_path = logs/outdoor_core_runtime.log
storage_log_max_bytes = 1048576
storage_log_backup_count = 3

history_enabled = false
history_output_path = data/history
history_flush_interval_ms = 1000

compass_enabled = true
compass_calibration_valid = false
compass_declination_degrees = 0.0
compass_hard_iron_x_ut = 0.0
compass_hard_iron_y_ut = 0.0
compass_hard_iron_z_ut = 0.0
compass_soft_iron_00 = 1.0
compass_soft_iron_01 = 0.0
compass_soft_iron_02 = 0.0
compass_soft_iron_10 = 0.0
compass_soft_iron_11 = 1.0
compass_soft_iron_12 = 0.0
compass_soft_iron_20 = 0.0
compass_soft_iron_21 = 0.0
compass_soft_iron_22 = 1.0
compass_minimum_field_ut = 5.0
compass_maximum_field_ut = 100.0
compass_minimum_acceleration_g = 0.70
compass_maximum_acceleration_g = 1.30
compass_maximum_sample_age_ms = 250

board_imu_enabled = true
board_imu_source = char_device
board_imu_device_path = /dev/icm20608
board_imu_iio_path = /sys/bus/iio/devices/iio:device0
board_imu_sample_count = 0
board_imu_sample_interval_ms = 100

dashboard_enabled = false
dashboard_output_path = /run/outdoor-agent/dashboard.txt
dashboard_output_mode = text
dashboard_framebuffer_device = /dev/fb0
dashboard_refresh_count = 0
dashboard_refresh_interval_ms = 1000

launcher_enabled = false
launcher_input_device = /dev/input/touchscreen0
launcher_auto_start_seconds = 0

log_level = info
